name: Scrape ETF Holdings

on:
  workflow_dispatch:
  # cron-job.org is the PRIMARY trigger (fires at 13:35 UTC via the dispatches
  # API, which arrives here as a workflow_dispatch event). This GitHub-native
  # schedule is a BACKUP that only runs if the primary did NOT land a holdings
  # update today — see the `guard` job below. So on a normal day exactly one
  # scrape runs (the cron-job.org one); the scheduled run self-skips.
  schedule:
    - cron: '50 13 * * *'   # 13:50 UTC backup (primary cron-job.org is 13:35 UTC)

jobs:
  # Decide whether the scrape should run. The primary (workflow_dispatch from
  # cron-job.org, or any manual run) always proceeds. The scheduled backup only
  # proceeds if today's "ETF holdings update" commit is missing — i.e. the
  # primary either never fired or failed before committing fresh data.
  guard:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # need full history to inspect today's commits

      - id: check
        run: |
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "Triggered by '${{ github.event_name }}' — primary run, proceeding."
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git fetch origin master --quiet
          TODAY=$(date -u +%Y-%m-%d)
          if git log FETCH_HEAD --since="$TODAY 00:00:00 +0000" \
               --grep="data: ETF holdings update $TODAY" --oneline | grep -q .; then
            echo "Primary scrape already committed holdings for $TODAY — skipping backup."
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          else
            echo "No holdings update found for $TODAY — running backup scrape."
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          fi

  scrape:
    needs: guard
    if: needs.guard.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Fetch holdings + build data.ts
        run: node scripts/run-all.js

      # International Markets pipeline (lib/markets-data.ts + markets-history.json).
      # Isolated on purpose: a markets failure must never block the conviction
      # pipeline commit. On failure the markets files are simply left unchanged.
      - name: Fetch international markets data
        continue-on-error: true
        run: node scripts/fetch-markets.js

      - name: Verify prices not all zero
        run: |
          ZERO_COUNT=$(grep -c 'price: 0\.00' lib/data.ts || true)
          NONZERO_COUNT=$(grep -cP 'price: [1-9]' lib/data.ts || true)
          echo "Zero-price entries: $ZERO_COUNT"
          echo "Non-zero-price entries: $NONZERO_COUNT"
          if [ "$NONZERO_COUNT" -lt 20 ]; then
            echo "ERROR: fewer than 20 non-zero prices found. Yahoo Finance auth likely failed. Aborting commit."
            exit 1
          fi

      - name: Commit and push
        run: |
          git config user.name "top10-bot"
          git config user.email "bot@spready.io"
          # Save generated outputs before resetting — these are always the authoritative versions
          cp lib/holdings-raw.json /tmp/holdings-raw.json
          cp lib/data.ts           /tmp/data.ts
          [ -f lib/scan-report.json ] && cp lib/scan-report.json /tmp/scan-report.json || true
          [ -f lib/history.json ]   && cp lib/history.json        /tmp/history.json    || true
          [ -f lib/markets-data.ts ]     && cp lib/markets-data.ts     /tmp/markets-data.ts     || true
          [ -f lib/markets-history.json ] && cp lib/markets-history.json /tmp/markets-history.json || true
          # Reset to the absolute latest origin/master to avoid rebase conflicts
          git fetch origin master
          git reset --hard origin/master
          # Restore generated files on top of latest master
          cp /tmp/holdings-raw.json lib/holdings-raw.json
          cp /tmp/data.ts           lib/data.ts
          [ -f /tmp/scan-report.json ] && cp /tmp/scan-report.json lib/scan-report.json || true
          [ -f /tmp/history.json ]   && cp /tmp/history.json       lib/history.json    || true
          [ -f /tmp/markets-data.ts ]     && cp /tmp/markets-data.ts     lib/markets-data.ts     || true
          [ -f /tmp/markets-history.json ] && cp /tmp/markets-history.json lib/markets-history.json || true
          git add lib/holdings-raw.json lib/data.ts lib/scan-report.json lib/history.json lib/markets-data.ts lib/markets-history.json
          git diff --staged --quiet || git commit -m "data: ETF holdings update $(date -u +%Y-%m-%d)"
          git push

      - name: Send daily report email
        env:
          GMX_USER:     ${{ secrets.GMX_USER }}
          GMX_PASSWORD: ${{ secrets.GMX_PASSWORD }}
        run: node scripts/send-report.js
