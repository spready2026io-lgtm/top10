name: Scrape ETF Holdings

on:
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Fetch holdings + build data.ts
        run: node scripts/run-all.js

      - name: Commit and push
        run: |
          git config user.name "top10-bot"
          git config user.email "bot@spready.io"
          # Save generated outputs before resetting — these are always the authoritative versions
          cp lib/holdings-raw.json /tmp/holdings-raw.json
          cp lib/data.ts           /tmp/data.ts
          [ -f lib/scan-report.json ] && cp lib/scan-report.json /tmp/scan-report.json || true
          [ -f lib/history.json ]   && cp lib/history.json        /tmp/history.json    || true
          # Reset to the absolute latest origin/master to avoid rebase conflicts
          git fetch origin master
          git reset --hard origin/master
          # Restore generated files on top of latest master
          cp /tmp/holdings-raw.json lib/holdings-raw.json
          cp /tmp/data.ts           lib/data.ts
          [ -f /tmp/scan-report.json ] && cp /tmp/scan-report.json lib/scan-report.json || true
          [ -f /tmp/history.json ]   && cp /tmp/history.json       lib/history.json    || true
          git add lib/holdings-raw.json lib/data.ts lib/scan-report.json lib/history.json
          git diff --staged --quiet || git commit -m "data: ETF holdings update $(date -u +%Y-%m-%d)"
          git push

      - name: Send daily report email
        env:
          GMX_USER:     ${{ secrets.GMX_USER }}
          GMX_PASSWORD: ${{ secrets.GMX_PASSWORD }}
        run: node scripts/send-report.js
